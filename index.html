<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario F1 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="hero-countdown">
        <h2>PRÓXIMA CARRERA</h2>
        <div id="next-race-name">Cargando...</div>
        <div id="countdown" class="timer">00d 00h 00m 00s</div>
    </div>

    <main>
        <div class="controls">
            <button class="filter-btn active" onclick="filterRaces('all')">Todo</button>
            <button class="filter-btn" onclick="filterRaces('upcoming')">Próximas</button>
            <button class="filter-btn" onclick="filterRaces('completed')">Completadas</button>
            
            <span class="separator">|</span>

            <button class="filter-btn" onclick="showStandings('drivers')">Clasificación Pilotos</button>
            <button class="filter-btn" onclick="showStandings('constructors')">Clasificación Escuderías</button>
        </div>

        <br>

        <section id="standings-container" class="standings-container" style="display: none;">
            <div id="standings-content"></div>
        </section>

        <section id="races-grid" class="grid-container">
            </section>
    </main>

    <footer>
        <p>Desarrollado por xPachuS</p>
    </footer>

    <script src="script.js">
    document.addEventListener('contextmenu', event => event.preventDefault());
    
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || 
          (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || 
          (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    }
    </script>
</body>
</html>
